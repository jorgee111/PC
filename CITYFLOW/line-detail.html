<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Línea - CityFlow</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/line-detail.css">
    <link rel="icon" href="img/favicon.ico">
</head>
<body>
    <header>
        <nav class="navbar glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
            <a href="dashboard.html" class="logo">CityFlow</a>
            <section class="nav-links">
                <a href="dashboard.html" class="accent-link">← Volver al Dashboard</a>
            </section>
        </nav>
    </header>

    <main class="detail-wrapper">
        <article class="detail-header glass-panel">
            <section>
                <h1 style="color: var(--text-main); margin-bottom: 8px;">Cargando línea...</h1>
                <span class="badge-status">--</span>
            </section>
            <a href="create-incident.html" class="btn btn-danger-glow">⚠️ Reportar Incidencia</a>
        </article>

        <article class="iot-stats">
            <section class="stat-box glass-panel">
                <h3>--%</h3>
                <p>Ocupación</p>
            </section>
            <section class="stat-box glass-panel">
                <h3>--°C</h3>
                <p>Temperatura</p>
            </section>
            <section class="stat-box glass-panel">
                <h3>--</h3>
                <p>Sensores Motor</p>
            </section>
        </article>

        <article class="info-section">
            <h2 style="color: var(--text-main); margin-bottom: 20px;">Flota Activa</h2>
            <div class="table-container glass-panel">
                <table class="flota-table">
                    <thead>
                        <tr>
                            <th>ID Vehículo</th>
                            <th>Conductor</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </article>
    </main>

    <footer class="main-footer">
        <section class="footer-content">
            <p>&copy; 2026 CityFlow - Gestión de Movilidad Urbana</p>
        </section>
    </footer>

    <script src="js/line-detail.js"></script>
</body>
</html>

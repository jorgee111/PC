<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Operaciones - CityFlow</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    
    <header class="admin-header">
        <nav class="navbar glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
            <div class="brand">
                <a href="admin-dashboard.html" class="logo"><img src="img/cityflow-removebg-preview.png" alt="CityFlow"></a>
                <span class="role-badge">MODO OPERADOR</span>
            </div>
            <div class="nav-links">
                <span id="welcome-msg" class="welcome-text"></span>
                <a href="index.html" id="logout-btn" class="accent-link">Cerrar Sesión</a>
            </div>
        </nav>
    </header>

    <main class="admin-wrapper">
        <article class="admin-controls">
            <h1>Gestión de Incidencias</h1>
            
            <section class="stats-row">
                <div class="kpi-card glass-panel kpi-danger">
                    <h3 id="count-pending">0</h3>
                    <small>Pendientes</small>
                </div>
                <div class="kpi-card glass-panel kpi-success">
                    <h3 id="count-solved">0</h3>
                    <small>Resueltas Hoy</small>
                </div>
            </section>
        </article>

        <article class="table-container glass-panel">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Línea</th>
                        <th>Reportado por</th>
                        <th>Tipo</th>
                        <th>Prioridad</th>
                        <th>Acción / Estado</th>
                    </tr>
                </thead>
                <tbody id="incidents-tbody">
                </tbody>
            </table>
        </article>
    </main>

    <footer class="main-footer">
        <section class="footer-content">
            <p>&copy; 2026 CityFlow - Panel de Control Administrativo</p>
        </section>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>

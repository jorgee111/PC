<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - CityFlow</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="img/favicon.ico">
</head>
<body class="auth-body">

    <main class="login-container">
        <article class="login-card glass-panel">

            <section class="logo-container">
                <img src="img/cityflow-removebg-preview.png" alt="Logo CityFlow" class="cityflow-logo">
            </section>

            <h2>Bienvenido</h2>
            <p class="subtitle">Inicia sesión para continuar</p>

            <form id="login-form">
                <section class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required>
                </section>

                <section class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </section>

                <button type="submit" class="btn btn-primary" id="btn-login" style="width: 100%; margin-top: 1rem;">Entrar</button>
            </form>

            <section class="register-link-container">
                <p>¿No tienes cuenta? <a href="register.html" class="accent-link">Créala aquí</a></p>
            </section>

            <p class="message-box" id="error-message"></p>

        </article>
    </main>

    <script src="js/login.js"></script>
</body>
</html>

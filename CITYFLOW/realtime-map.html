<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa en Tiempo Real - CityFlow</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/realtime-map.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header>
        <nav class="navbar glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
            <a href="dashboard.html" class="logo"><img src="img/cityflow-removebg-preview.png" alt="CityFlow"></a>
            <label for="menu-toggle" class="menu-icon">☰</label>
            <input id="menu-toggle" type="checkbox">
            <section class="nav-links">
                <a href="realtime-map.html" class="active">Mapa en Tiempo Real</a>
                <a href="prediction.html">Predicción IA</a>
                <a href="dashboard.html">Líneas</a>
                <a href="my-incidents.html">Mis Incidencias</a>
                <a href="index.html" id="logout-btn" class="accent-link">Salir</a>
            </section>
        </nav>
    </header>

    <main class="map-wrapper">
        <article class="map-header glass-panel" style="border-radius: 0; border-left: none; border-right: none;">
            <h1>Seguimiento de Flota en Tiempo Real</h1>
            <section class="indicators">
                <span class="dot green"></span> Baja Ocupación
                <span class="dot yellow"></span> Media
                <span class="dot red"></span> Alta
            </section>
        </article>

        <div id="map"></div>
    </main>

    <footer class="main-footer">
        <article class="footer-content">
            <p>&copy; 2026 CityFlow - Madrid Operations</p>
        </article>
    </footer>

    <script src="js/realtime-map.js"></script>
</body>
</html>

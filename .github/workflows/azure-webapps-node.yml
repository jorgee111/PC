# Workflow para CityFlow API Express → Azure App Service
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'cityflow'        # ← TU APP SERVICE
  AZURE_WEBAPP_PACKAGE_PATH: '.'       # ← Archivos en raíz
  NODE_VERSION: '20.x'                 # ← Tu versión Node

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Debug - List files
      run: |
        echo "=== Archivos en raíz ==="
        ls -la
        echo "=== Verificar archivos clave ==="
        ls -la app.js package.json || echo "❌ Archivos no encontrados"

    - name: npm install (solo tu API)
      run: |
        npm install

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-api
        path: .

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-api

    - name: 'Deploy CityFlow API to Azure'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

